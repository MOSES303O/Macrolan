<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CCTV installation and surveillance">
  <defs>
    <linearGradient id="m4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#14857F"/><stop offset="1" stop-color="#0C5C5B"/></linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34C7B8" stop-opacity="0.45"/><stop offset="1" stop-color="#34C7B8" stop-opacity="0.05"/></linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="#EAF4F3"/>
  <circle cx="110" cy="78" r="96" fill="#DBEDEB"/>

  <!-- mount -->
  <rect x="92" y="96" width="14" height="46" rx="7" fill="#0E2120"/>
  <circle cx="99" cy="96" r="12" fill="#0E2120"/>

  <!-- field of view cone -->
  <path d="M150 150 L398 120 L420 300 L150 178 Z" fill="url(#cone)"/>

  <!-- camera body -->
  <g transform="rotate(14 150 152)">
    <rect x="96" y="126" width="150" height="58" rx="22" fill="url(#m4)"/>
    <circle cx="232" cy="155" r="26" fill="#0E2120"/>
    <circle cx="232" cy="155" r="14" fill="#0C4A48"/>
    <circle cx="226" cy="149" r="5" fill="#5BD8CB"/>
    <rect x="112" y="142" width="40" height="10" rx="5" fill="#0C4A48"/>
    <circle cx="120" cy="168" r="4" fill="#5BD8CB"/>
  </g>

  <!-- monitored figure -->
  <circle cx="356" cy="244" r="18" fill="#0C5C5B"/>
  <path d="M326 308 a30 30 0 0 1 60 0 Z" fill="#0C5C5B"/>

  <!-- rec dot -->
  <circle cx="402" cy="86" r="8" fill="#34C7B8"/>
  <circle cx="402" cy="86" r="14" fill="none" stroke="#34C7B8" stroke-width="2" opacity="0.5"/>
</svg>
