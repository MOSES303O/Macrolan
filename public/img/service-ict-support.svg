<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ICT support, available around the clock">
  <defs>
    <linearGradient id="m6" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#14857F"/><stop offset="1" stop-color="#0C5C5B"/></linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="#EAF4F3"/>
