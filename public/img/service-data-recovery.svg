<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Data recovery and restoration">
  <defs>
    <linearGradient id="dr" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#14857F"/><stop offset="1" stop-color="#0C5C5B"/></linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="#EAF4F3"/>
  <circle cx="372" cy="86" r="92" fill="#DBEDEB"/>

  <!-- hard drive body -->
  <g transform="rotate(-8 240 190)">
    <rect x="120" y="120" width="240" height="150" rx="16" fill="url(#dr)"/>
    <!-- platter -->
    <circle cx="206" cy="195" r="58" fill="#0E2120"/>
    <circle cx="206" cy="195" r="58" fill="none" stroke="#0C4A48" stroke-width="6"/>
    <circle cx="206" cy="195" r="30" fill="#0C4A48"/>
    <circle cx="206" cy="195" r="9" fill="#5BD8CB"/>
    <!-- actuator arm -->
    <rect x="244" y="150" width="64" height="12" rx="6" fill="#5BD8CB" transform="rotate(34 244 150)"/>
    <!-- header pins / label -->
    <rect x="290" y="206" width="54" height="10" rx="5" fill="#34C7B8"/>
    <rect x="290" y="226" width="40" height="10" rx="5" fill="#0C4A48"/>
  </g>

  <!-- circular restore arrow -->
  <g>
    <path d="M120 196 a96 96 0 1 1 28 68" fill="none" stroke="#34C7B8" stroke-width="12" stroke-linecap="round"/>
    <path d="M120 150 L120 200 L168 196 Z" fill="#34C7B8"/>
  </g>

  <!-- recovered check badge -->
  <circle cx="372" cy="86" r="34" fill="#0C5C5B"/>
  <path d="M357 87 l11 12 l20 -26" fill="none" stroke="#EAF4F3" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
